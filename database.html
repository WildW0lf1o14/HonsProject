<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Database</title>

    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
    /* ----------------------------
       Body / General Styles
    ---------------------------- */
    body {
        font-family: "Times New Roman", serif;
        margin: 40px;
        background-color: #000000;
        color: #FF0000;
    }

    h1, h2, h3 {
        text-align: center;
        color: #FF0000;
    }

    /* ----------------------------
       Form / Input Area
    ---------------------------- */
    form {
        background-color: #1a1a1a;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    input, select, button, textarea {
        margin: 5px;
        padding: 8px;
        font-family: "Times New Roman", serif;
        background-color: #333333;
        color: #FF0000;
        border: 1px solid #FF0000;
    }

    textarea {
        width: 100%;
    }

    /* ----------------------------
       Table Styles
    ---------------------------- */
    table {
        width: 100%;
        border-collapse: collapse;
        background-color: #1a1a1a;
    }

    th, td {
        padding: 10px;
        border: 1px solid #FF0000;
        text-align: left;
    }

    /* ----------------------------
       Buttons
    ---------------------------- */
    button {
        cursor: pointer;
        background-color: #FF0000;
        color: #000000;
        border: none;
        border-radius: 5px;
    }

    button:hover {
        background-color: #FF4C4C;
    }
    /* ----------------------------
        Online/Offline check
     ----------------------------*/
    #statusIndicator {
        margin-bottom: 10px;
        font-weight: bold;
    }

    .online {
        color: #00FF00;
    }

    .offline {
        color: #FFFF00;
    }
        
    /* ----------------------------
       Top Bar
    ---------------------------- */
    .top-bar {
        text-align: right;
        margin-bottom: 10px;
    }

    /* ----------------------------
       Benchmark Panel
    ---------------------------- */
    .benchmark {
        margin-top: 30px;
        padding: 20px;
        border: 1px solid #FF0000;
        background-color: #1a1a1a;
    }

    #results {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid #FF0000;
    }


    /* ----------------------------
   Progress Bar / File Status
   Gives visual feedback during upload
---------------------------- */
#progressContainer {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #FF0000;
    background-color: #1a1a1a;
}

#progressText {
    margin-top: 8px;
    color: #FF4C4C;
}

progress {
    width: 100%;
    height: 20px;
}
</style>

</head>
<body>
<!-- ======================================
    LOGIN/LOGOUT BUTTON AND ONLINE/OFFLINE
============================================ -->
<div class="top-bar">
    <button onclick="logout()">Logout</button>
</div>

<div id="statusIndicator">
    Backend Status: <span id="statusText">Checking Connection</span>
</div>

<h1>Database System</h1>


<!-- =========================
     ORIGINAL DATABASE FORM
========================= -->
<form id="recordForm">
    <input type="text" id="id" placeholder="ID" required>
    <input type="text" id="first_name" placeholder="First Name" required>
    <input type="text" id="last_name" placeholder="Last Name" required>
    <input type="number" id="age" placeholder="Age" required>

    <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
        <option value="prefer not to say">Prefer not to say</option>
    </select>

    <select id="employment">
        <option value="employed">Employed</option>
        <option value="unemployed">Unemployed</option>
    </select>

    <button type="submit">Add Record</button>
</form>

<!-- =========================
     ORIGINAL TABLE
========================= -->
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>First</th>
            <th>Last</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Employment</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<!-- =========================
     BENCHMARK SECTION
========================= -->
<div class="benchmark">

<h2>Encryption Benchmarking</h2>

<textarea id="testInput" rows="4" placeholder="Enter text to test..."></textarea>

<br>

<select id="modeSelect">
    <option value="AES">AES</option>
    <option value="LLM">LLM</option>
    <option value="HYBRID">Hybrid</option>
</select>

<button onclick="runBenchmark()">Run Benchmark</button>

<h3>Upload File</h3>
<input type="file" id="fileInput">
<button onclick="uploadFile()">Test File</button>

<br><br>

<button onclick="downloadResults()">Download CSV</button>

<!-- =========================
FILE PROCESSING PROGRESS
Shows upload/processing state
========================= -->
<div id="progressContainer" style="display:none; margin-top: 10px;">
    <label for="progressBar">Processing file...</label>
    <progress id="progressBar" value="0" max="100" style="width: 100%;"></progress>
    <p id="progressText">Starting...</p>
</div>

<div id="results"></div>

<h3>Performance Graph</h3>
<canvas id="performanceChart"></canvas>

</div>



<!-- =========================
    SCRIPT STARTS HERE
========================= -->

<script>
document.addEventListener("DOMContentLoaded", () => {

/*
=========================================
 AUTH CHECK
=========================================
*/
const loggedIn = JSON.parse(localStorage.getItem("loggedIn"));
if (!loggedIn) {
    window.location.href = "index.html";
}

/*
=========================================
 LOCAL DATABASE (UNCHANGED)
=========================================
*/
let db = JSON.parse(localStorage.getItem("database")) || [];

function saveDB() {
    localStorage.setItem("database", JSON.stringify(db));
}

function renderTable() {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    db.forEach((record, index) => {
        table.innerHTML += `
            <tr>
                <td>${record.id}</td>
                <td>${record.first_name}</td>
                <td>${record.last_name}</td>
                <td>${record.age}</td>
                <td>${record.gender}</td>
                <td>${record.employment}</td>
                <td>
                    <button onclick="deleteRecord(${index})">Delete</button>
                </td>
            </tr>
        `;
    });
}

document.getElementById("recordForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const record = {
        id: document.getElementById("id").value,
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        age: parseInt(document.getElementById("age").value),
        gender: document.getElementById("gender").value,
        employment: document.getElementById("employment").value
    };

    if (db.some(r => r.id === record.id)) {
        alert("ID already exists!");
        return;
    }

    db.push(record);
    saveDB();
    renderTable();
    document.getElementById("recordForm").reset();
});

window.deleteRecord = function(index) {
    db.splice(index, 1);
    saveDB();
    renderTable();
}

window.logout = function() {
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
}

renderTable();

/*
=========================================
 BENCHMARK SYSTEM
=========================================
*/

let chart;
let labels = [];
let encData = [];
let decData = [];

window.runBenchmark = async function() {
    const text = document.getElementById("testInput").value;
    const mode = document.getElementById("modeSelect").value;

    await fetch("http://127.0.0.1:5000/set_mode", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mode})
    });

    const res = await fetch("http://127.0.0.1:5000/benchmark", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text})
    });

    const data = await res.json();

    document.getElementById("results").innerHTML = `
        <p>Encrypted: ${data.encrypted}</p>
        <p>Decrypted: ${data.decrypted}</p>
        <p>Enc Time: ${data.encryption_time.toFixed(6)}s</p>
        <p>Dec Time: ${data.decryption_time.toFixed(6)}s</p>
    `;

    updateChart(mode, data.encryption_time, data.decryption_time);
}
/*
=========================================
origional uploadFile, remove when patched

window.uploadFile = async function() {
    const file = document.getElementById("fileInput").files[0];

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("http://127.0.0.1:5000/benchmark_file", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    const mode = document.getElementById("modeSelect").value;

    updateChart(mode, data.encryption_time, data.decryption_time);
}
=========================================
*/


/*
=========================================
 FILE UPLOAD + BENCHMARK
 Sends selected file to backend,
 shows progress state,
 displays returned results,
 and updates performance graph
=========================================
*/
window.uploadFile = async function() {
    const file = document.getElementById("fileInput").files[0];
    const mode = document.getElementById("modeSelect").value;

    // Result + progress UI elements
    const resultsBox = document.getElementById("results");
    const progressContainer = document.getElementById("progressContainer");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    // Prevent empty upload attempts
    if (!file) {
        alert("Please choose a file first.");
        return;
    }

    try {
        /*
        -----------------------------------------
        Show progress panel
        -----------------------------------------
        */
        progressContainer.style.display = "block";
        progressBar.value = 10;
        progressText.textContent = "Preparing upload...";

        /*
        -----------------------------------------
        Send chosen encryption mode
        Ensures file benchmark uses correct mode
        -----------------------------------------
        */
        await fetch("http://127.0.0.1:5000/set_mode", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mode })
        });

        progressBar.value = 25;
        progressText.textContent = "Uploading file...";

        /*
        -----------------------------------------
        Create multipart form data
        for backend file upload
        -----------------------------------------
        */
        const formData = new FormData();
        formData.append("file", file);

        /*
        -----------------------------------------
        Send file to backend benchmark route
        -----------------------------------------
        */
        const res = await fetch("http://127.0.0.1:5000/benchmark_file", {
            method: "POST",
            body: formData
        });

        progressBar.value = 75;
        progressText.textContent = "Processing benchmark results...";

        const data = await res.json();

        /*
        -----------------------------------------
        Handle backend-side errors
        -----------------------------------------
        */
        if (!res.ok) {
            throw new Error(data.error || "File benchmark failed.");
        }

        /*
        -----------------------------------------
        Show returned benchmark output
        in results panel
        -----------------------------------------
        */
        resultsBox.innerHTML = `
            <p><strong>Uploaded File:</strong> ${file.name}</p>
            <p><strong>Encrypted:</strong> ${data.encrypted}</p>
            <p><strong>Decrypted:</strong> ${data.decrypted}</p>
            <p><strong>Encryption Time:</strong> ${data.encryption_time.toFixed(6)}s</p>
            <p><strong>Decryption Time:</strong> ${data.decryption_time.toFixed(6)}s</p>
        `;

        /*
        -----------------------------------------
        Begin To Update chart
        -----------------------------------------
        */
        progressBar.value = 90;
        progressText.textContent = "Generating graph...";

        updateChart(mode, data.encryption_time, data.decryption_time);

        /*
        -----------------------------------------
        Finish progress UI
        -----------------------------------------
        */
        progressBar.value = 100;
        progressText.textContent = "Process Complete, Results Generated.";

        // Hide progress panel shortly after completion
        setTimeout(() => {
            progressContainer.style.display = "none";
            progressBar.value = 0;
            progressText.textContent = "Starting...";
        }, 1200);

    } catch (error) {
        /*
        -----------------------------------------
         Display frontend/network/backend errors
        -----------------------------------------
        */
        console.error("Upload error:", error);
        resultsBox.innerHTML = `<p><strong>Error:</strong> ${error.message}</p>`;
        progressText.textContent = "Failed.";
    }
}

/*
=========================================
 CHART UPDATE
 Adds latest benchmark timings to graph
=========================================
*/
function updateChart(mode, enc, dec) {
    const canvas = document.getElementById("performanceChart");

    // Prevent graph code from failing if canvas is missing
    if (!canvas) {
        console.error("performanceChart canvas not found.");
        return;
    }

    // Add latest run to chart data arrays
    labels.push(mode + " #" + (labels.length + 1));
    encData.push(enc);
    decData.push(dec);

    // Destroy previous chart instance before rebuilding
    if (chart) {
        chart.destroy();
    }

    // Build new bar chart
    chart = new Chart(canvas, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [
                {
                    label: "Encryption Time",
                    data: encData
                },
                {
                    label: "Decryption Time",
                    data: decData
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

window.downloadResults = function() {
    window.open("http://127.0.0.1:5000/download_results");
}

/*
=========================================
 BACKEND STATUS INDICATOR (NEW)
=========================================
*/

async function checkBackendStatus() {
    const statusText = document.getElementById("statusText");

    try {
        const res = await fetch("http://127.0.0.1:5000/health");

        if (res.ok) {
            statusText.textContent = "Online";
            statusText.className = "online";
        } else {
            throw new Error("Server error");
        }

    } catch (error) {
        statusText.textContent = "Offline";
        statusText.className = "offline";
    }
}

// Run once when page loads
checkBackendStatus();

// Refresh every 20 seconds
setInterval(checkBackendStatus, 20000);

});
</script>

</body>
</html>
