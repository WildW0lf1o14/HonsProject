<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Database</title>

    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
    /* ----------------------------
       Body / General Styles
    ---------------------------- */
    body {
        font-family: "Times New Roman", serif;
        margin: 40px;
        background-color: #000000;
        color: #FF0000;
    }

    h1, h2, h3 {
        text-align: center;
        color: #FF0000;
    }

    /* ----------------------------
       Form / Input Area
    ---------------------------- */
    form {
        background-color: #1a1a1a;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    input, select, button, textarea {
        margin: 5px;
        padding: 8px;
        font-family: "Times New Roman", serif;
        background-color: #333333;
        color: #FF0000;
        border: 1px solid #FF0000;
    }

    textarea {
        width: 100%;
    }

    /* ----------------------------
       Table Styles
    ---------------------------- */
    table {
        width: 100%;
        border-collapse: collapse;
        background-color: #1a1a1a;
    }

    th, td {
        padding: 10px;
        border: 1px solid #FF0000;
        text-align: left;
    }

    /* ----------------------------
       Buttons
    ---------------------------- */
    button {
        cursor: pointer;
        background-color: #FF0000;
        color: #000000;
        border: none;
        border-radius: 5px;
    }

    button:hover {
        background-color: #FF4C4C;
    }
    /* ----------------------------
        Online/Offline check
     ----------------------------*/
    #statusIndicator {
        margin-bottom: 10px;
        font-weight: bold;
    }

    .online {
        color: #00FF00;
    }

    .offline {
        color: #000080;
    }
        
    /* ----------------------------
       Top Bar
    ---------------------------- */
    .top-bar {
        text-align: right;
        margin-bottom: 10px;
    }

    /* ----------------------------
       Benchmark Panel
    ---------------------------- */
    .benchmark {
        margin-top: 30px;
        padding: 20px;
        border: 1px solid #FF0000;
        background-color: #1a1a1a;
    }

    #results {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid #FF0000;
    }
</style>

</head>
<body>
<!-- ======================================
    LOGIN/LOGOUT BUTTON AND ONLINE/OFFLINE
============================================ -->
<div class="top-bar">
    <button onclick="logout()">Logout</button>
</div>

<div id="statusIndicator">
    Backend Status: <span id="statusText">Checking Connection</span>
</div>
<h1>Database System</h1>

<!-- =========================
     ORIGINAL DATABASE FORM
========================= -->
<form id="recordForm">
    <input type="text" id="id" placeholder="ID" required>
    <input type="text" id="first_name" placeholder="First Name" required>
    <input type="text" id="last_name" placeholder="Last Name" required>
    <input type="number" id="age" placeholder="Age" required>

    <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
        <option value="prefer not to say">Prefer not to say</option>
    </select>

    <select id="employment">
        <option value="employed">Employed</option>
        <option value="unemployed">Unemployed</option>
    </select>

    <button type="submit">Add Record</button>
</form>

<!-- =========================
     ORIGINAL TABLE
========================= -->
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>First</th>
            <th>Last</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Employment</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<!-- =========================
     BENCHMARK SECTION
========================= -->
<div class="benchmark">

<h2>Encryption Benchmarking</h2>

<textarea id="testInput" rows="4" placeholder="Enter text to test..."></textarea>

<br>

<select id="modeSelect">
    <option value="AES">AES</option>
    <option value="LLM">LLM</option>
    <option value="HYBRID">Hybrid</option>
</select>

<button onclick="runBenchmark()">Run Benchmark</button>

<h3>Upload File</h3>
<input type="file" id="fileInput">
<button onclick="uploadFile()">Test File</button>

<br><br>

<button onclick="downloadResults()">Download CSV</button>

<div id="results"></div>

<h3>Performance Graph</h3>
<canvas id="performanceChart"></canvas>

</div>



<!-- =========================
    SCRIPT STARTS HERE
========================= -->

<script>
document.addEventListener("DOMContentLoaded", () => {

/*
=========================================
 AUTH CHECK
=========================================
*/
const loggedIn = JSON.parse(localStorage.getItem("loggedIn"));
if (!loggedIn) {
    window.location.href = "index.html";
}

/*
=========================================
 LOCAL DATABASE (UNCHANGED)
=========================================
*/
let db = JSON.parse(localStorage.getItem("database")) || [];

function saveDB() {
    localStorage.setItem("database", JSON.stringify(db));
}

function renderTable() {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    db.forEach((record, index) => {
        table.innerHTML += `
            <tr>
                <td>${record.id}</td>
                <td>${record.first_name}</td>
                <td>${record.last_name}</td>
                <td>${record.age}</td>
                <td>${record.gender}</td>
                <td>${record.employment}</td>
                <td>
                    <button onclick="deleteRecord(${index})">Delete</button>
                </td>
            </tr>
        `;
    });
}

document.getElementById("recordForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const record = {
        id: document.getElementById("id").value,
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        age: parseInt(document.getElementById("age").value),
        gender: document.getElementById("gender").value,
        employment: document.getElementById("employment").value
    };

    if (db.some(r => r.id === record.id)) {
        alert("ID already exists!");
        return;
    }

    db.push(record);
    saveDB();
    renderTable();
    document.getElementById("recordForm").reset();
});

window.deleteRecord = function(index) {
    db.splice(index, 1);
    saveDB();
    renderTable();
}

window.logout = function() {
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
}

renderTable();

/*
=========================================
 BENCHMARK SYSTEM
=========================================
*/

let chart;
let labels = [];
let encData = [];
let decData = [];

window.runBenchmark = async function() {
    const text = document.getElementById("testInput").value;
    const mode = document.getElementById("modeSelect").value;

    await fetch("http://127.0.0.1:5000/set_mode", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mode})
    });

    const res = await fetch("http://127.0.0.1:5000/benchmark", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text})
    });

    const data = await res.json();

    document.getElementById("results").innerHTML = `
        <p>Encrypted: ${data.encrypted}</p>
        <p>Decrypted: ${data.decrypted}</p>
        <p>Enc Time: ${data.encryption_time.toFixed(6)}s</p>
        <p>Dec Time: ${data.decryption_time.toFixed(6)}s</p>
    `;

    updateChart(mode, data.encryption_time, data.decryption_time);
}

window.uploadFile = async function() {
    const file = document.getElementById("fileInput").files[0];

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("http://127.0.0.1:5000/benchmark_file", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    const mode = document.getElementById("modeSelect").value;

    updateChart(mode, data.encryption_time, data.decryption_time);
}

function updateChart(mode, enc, dec) {
    labels.push(mode + " #" + (labels.length + 1));
    encData.push(enc);
    decData.push(dec);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("performanceChart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [
                { label: "Encryption Time", data: encData },
                { label: "Decryption Time", data: decData }
            ]
        }
    });
}

window.downloadResults = function() {
    window.open("http://127.0.0.1:5000/download_results");
}

/*
=========================================
 BACKEND STATUS INDICATOR (NEW)
=========================================
*/

async function checkBackendStatus() {
    const statusText = document.getElementById("statusText");

    try {
        const res = await fetch("http://127.0.0.1:5000/health");

        if (res.ok) {
            statusText.textContent = "Online";
            statusText.className = "online";
        } else {
            throw new Error("Server error");
        }

    } catch (error) {
        statusText.textContent = "Offline";
        statusText.className = "offline";
    }
}

// Run once when page loads
checkBackendStatus();

// Refresh every 10 seconds
setInterval(checkBackendStatus, 10000);

});
</script>

</body>
</html>
